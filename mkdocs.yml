site_name: Pitwall Sprint — Trustable AI Racing Coach
site_url: https://www.tahabouhsine.com/pitwall/
site_description: Split-brain AI coaching for Sonoma Raceway, powered by Gemma 4 + Gemini 3 + Antigravity
repo_url: https://github.com/mlnomadpy/pitwall
repo_name: mlnomadpy/pitwall
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

